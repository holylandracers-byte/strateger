<!DOCTYPE html>
<html>
<head>
    <title>Apex Test</title>
</head>
<body>
    <h1>Testing Apex Connection</h1>
    <div id="status">Initializing...</div>
    <pre id="output"></pre>

    <script>
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        const raceUrl = 'https://www.apex-timing.com/live-timing/kartcentrum-brno/index.html';

        function getRaceBaseUrl(url) {
            const u = new URL(url);
            const path = u.pathname.endsWith('/')
                ? u.pathname
                : u.pathname.substring(0, u.pathname.lastIndexOf('/') + 1);
            return `${u.origin}${path}`;
        }

        async function detectWsUrl(url) {
            const race = new URL(url);
            const raceIsHttps = race.protocol === 'https:';
            const cfgUrl = `${getRaceBaseUrl(url)}javascript/config.js`;

            output.textContent += `Race URL: ${url}\n`;
            output.textContent += `Config URL: ${cfgUrl}\n`;

            const cfgText = await fetch(cfgUrl).then(r => {
                if (!r.ok) throw new Error(`config.js HTTP ${r.status}`);
                return r.text();
            });

            const m = cfgText.match(/var\s+configPort\s*=\s*(\d+)/i);
            if (!m) throw new Error('configPort not found in config.js');

            const configPort = parseInt(m[1], 10);
            const wsPort = raceIsHttps ? configPort + 3 : configPort + 2;
            const wsScheme = raceIsHttps ? 'wss' : 'ws';
            const wsUrl = `${wsScheme}://${race.hostname}:${wsPort}/`;

            output.textContent += `configPort=${configPort}\n`;
            output.textContent += `Derived WS URL=${wsUrl}\n\n`;

            return wsUrl;
        }

        async function start() {
            try {
                status.textContent = 'Resolving socket URL from config.js...';
                const wsUrl = await detectWsUrl(raceUrl);

                status.textContent = 'Testing WebSocket...';
                const ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    status.textContent = '✅ WebSocket Connected!';
                    output.textContent += `Connected to: ${wsUrl}\n`;
                };

                ws.onmessage = (event) => {
                    output.textContent += `\n📨 Message received:\n${event.data}\n`;
                };

                ws.onerror = (error) => {
                    status.textContent = '❌ WebSocket failed';
                    output.textContent += `WS Error: ${error}\n`;
                };

                ws.onclose = () => {
                    output.textContent += 'WebSocket closed\n';
                };
            } catch (e) {
                status.textContent = '❌ Detection failed';
                output.textContent += `Error: ${e.message}\n`;
            }
        }

        start();
    </script>
</body>
</html>
